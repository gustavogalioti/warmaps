window.toggleCidade = function(el) {
  el.classList.toggle('active')
}

window.seed = async function() {
  const btn = document.getElementById('btn')
  const log = document.getElementById('log')
  const bar = document.getElementById('bar')
  const status = document.getElementById('status')
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value

  if (!email || !senha) { alert('Preencha email e senha!'); return }

  const selecionadas = [...document.querySelectorAll('.cidade-btn.active')].map(el => el.dataset.cidade)
  if (selecionadas.length === 0) { alert('Selecione pelo menos uma cidade!'); return }

  btn.disabled = true
  log.innerHTML = ''

  function addLog(msg, cls) {
    log.innerHTML += `<div class="${cls}">${msg}</div>`
    log.scrollTop = log.scrollHeight
  }

  try {
    addLog('🔐 Autenticando...', 'info')
    await signInWithEmailAndPassword(auth, email, senha)
    addLog('✅ Autenticado com sucesso!', 'ok')
  } catch(e) {
    addLog(`❌ Erro: ${e.message}`, 'err')
    btn.disabled = false
    return
  }

  const todos = selecionadas.flatMap(c => dados[c])
  let ok = 0

  for (let i = 0; i < todos.length; i++) {
    const b = todos[i]
    // Cabeçalho de cidade
    if (i === 0 || todos[i-1].name.split('—')[1]?.trim() !== b.name.split('—')[1]?.trim()) {
      const cidade = b.name.includes('Jundiaí') ? '📍 JUNDIAÍ' : b.name.includes('Campinas') ? '📍 CAMPINAS' : b.name.includes('Sorocaba') ? '📍 SOROCABA' : ''
      if (cidade) addLog(cidade, 'head')
    }
    try {
      await addDoc(collection(db, 'conquest_points'), {
        ...b,
        owner_id: null, owner_name: null, clan_id: null,
        last_checkin: null, checkin_count: 0,
        created_at: serverTimestamp()
      })
      addLog(`✅ ${b.name}`, 'ok')
      ok++
    } catch(e) {
      addLog(`❌ ${b.name}: ${e.message}`, 'err')
    }
    const pct = Math.round(((i+1)/todos.length)*100)
    bar.style.width = pct + '%'
    status.textContent = `${i+1}/${todos.length} — ${pct}%`
  }

  addLog(`\n🏁 Concluído: ${ok}/${todos.length} pontos adicionados!`, 'ok')
  status.textContent = `✅ ${ok} pontos adicionados!`
  btn.textContent = '✅ Concluído!'
}
</script>

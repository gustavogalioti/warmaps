window.seed = async function() {
  const btn = document.getElementById('btn')
  const log = document.getElementById('log')
  const bar = document.getElementById('bar')
  const status = document.getElementById('status')
  btn.disabled = true
  log.innerHTML = ''

  function addLog(msg, cls) {
    log.innerHTML += `<div class="${cls}">${msg}</div>`
    log.scrollTop = log.scrollHeight
  }

  try {
    addLog('🔐 Autenticando...', 'info')
    const email = document.getElementById('email').value; const senha = document.getElementById('senha').value; await signInWithEmailAndPassword(auth, email, senha)
    addLog('✅ Autenticado!', 'ok')
  } catch(e) {
    addLog(`❌ Erro de autenticação: ${e.message}`, 'err')
    addLog('⚠️ Abra este arquivo dentro do app War Maps ou use seu login normal.', 'err')
    btn.disabled = false
    return
  }

  let ok = 0
  for (let i = 0; i < bairros.length; i++) {
    const b = bairros[i]
    try {
      await addDoc(collection(db, 'conquest_points'), {
        ...b,
        owner_id: null, owner_name: null, clan_id: null,
        last_checkin: null, checkin_count: 0,
        created_at: serverTimestamp()
      })
      addLog(`✅ ${b.name}`, 'ok')
      ok++
    } catch(e) {
      addLog(`❌ ${b.name}: ${e.message}`, 'err')
    }
    const pct = Math.round(((i+1)/bairros.length)*100)
    bar.style.width = pct + '%'
    status.textContent = `${i+1}/${bairros.length} — ${pct}%`
  }

  addLog(`\n🏁 Concluído: ${ok}/${bairros.length} bairros adicionados!`, 'ok')
  status.textContent = `✅ ${ok} bairros adicionados com sucesso!`
  btn.textContent = '✅ Concluído!'
}
</script>
